al Gate</text><text x="95" y="86" text-anchor="middle" class="arch-sub">human-in-the-loop · can_use_tool</text></g><g transform="translate(700 575)"><rect width="170" height="100" rx="16" class="arch-card" filter="url(#card-shadow-arch)"/><text x="85" y="40" text-anchor="middle" font-size="24">🔌</text><text x="85" y="68" text-anchor="middle" font-size="13" class="arch-label">MCP Server</text><text x="85" y="86" text-anchor="middle" class="arch-mono">retail_server.py</text></g><g transform="translate(905 575)"><rect width="130" height="100" rx="16" class="arch-card" filter="url(#card-shadow-arch)"/><text x="65" y="40" text-anchor="middle" font-size="24">💾</text><text x="65" y="68" text-anchor="middle" font-size="13" class="arch-label">Retail</text><text x="65" y="86" text-anchor="middle" class="arch-mono">retail.parquet</text></g></svg>